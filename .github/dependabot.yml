# Auto-update dependencies and surface security advisories as PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
